<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pagetitle">Movies</title>
    <style>
        body { background: #181818; color: #f0f0f0; font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1em;
            padding: 2em;
        }
        .img-grid img {
            width: 100%;
            border-radius: 8px;
            background: #222;
        }
    </style>
</head>
<body>
    <div>
        <p>Action</p>
        <p>Cartoons</p>
        <p>Comedy</p>
        <p>Fantasy</p>
        <p>MCU</p>
        <p>NCIS</p>
        <p>Science</p>
        <p>SciFi</p>
        <p>Star Trek</p>
        <p>Star Wars</p>
        <p>Westerns</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Action Movies</title>
    <link rel="stylesheet" href="/static/css/mtv.css">
</head>
<body>
    <div id="navbar">
        <a href="/"><button class="navbarbtn">Home</button></a>
        <a href="/mainmoviepage"><button class="navbarbtn">Movies</button></a>
        <a href="/maintvpage"><button class="navbarbtn">TV Shows</button></a>
    </div>
    <h1>Action Movies</h1>
    <div class="mov-images-grid">
        {{range .Images}}
            <img 
                id="{{.MovId}}" 
                class="mov-img" 
                src="{{.HttpThumbPath}}" 
                alt="Action Movie" 
            />
        {{else}}
            <p>No action movie images found.</p>
        {{end}}
    </div>
</body>
<script src="/static/javascript/mtv.js"></script>
</html>
